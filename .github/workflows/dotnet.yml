name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build and test
        shell: pwsh
        run: .\build.ps1 -Clean -Configuration Release -Test

      - name: Extract release notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $version = $env:TAG_NAME.TrimStart('v')
          $escapedVersion = [regex]::Escape($version)
          $lines = Get-Content CHANGELOG.md

          $start = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match "^## \[$escapedVersion\](?:\s|-|$)") {
                  $start = $i
                  break
              }
          }

          if ($start -lt 0) {
              throw "No CHANGELOG.md section found for tag '$env:TAG_NAME'."
          }

          $end = $lines.Count
          for ($i = $start + 1; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match '^## \[') {
                  $end = $i
                  break
              }
          }

          $lines[$start..($end - 1)] | Set-Content -Path release-notes.md -Encoding utf8

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          files: |
            ./STranslate.Plugin.Tts.FishAudio.spkg
